# HTTPS (после init-ssl.sh — копируется в nginx-gateway.conf)
server {
    listen 80;
    server_name stopkek.site www.stopkek.site;
    client_max_body_size 12m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name stopkek.site www.stopkek.site;
    client_max_body_size 12m;

    ssl_certificate /etc/letsencrypt/live/stopkek.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stopkek.site/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    location = / {
        default_type text/html;
        root /usr/share/nginx/public;
        try_files /index.html =404;
    }
    location = /privacy {
        default_type text/html;
        alias /usr/share/nginx/public/privacy.html;
    }
    location = /terms {
        default_type text/html;
        alias /usr/share/nginx/public/terms.html;
    }
    location = /offer {
        default_type text/html;
        alias /usr/share/nginx/public/offer.html;
    }
    location = /support {
        default_type text/html;
        alias /usr/share/nginx/public/support.html;
    }
    location /assets/ {
        alias /usr/share/nginx/public/assets/;
    }

    location /api/ {
        proxy_pass http://api:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://admin:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }
}
