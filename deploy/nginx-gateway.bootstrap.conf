# Временный конфиг для выпуска сертификата (шаг 1 init-ssl.sh)
server {
    listen 80;
    server_name stopkek.site www.stopkek.site;
    client_max_body_size 12m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location = / {
        default_type text/html;
        alias /usr/share/nginx/public/index.html;
    }
    location = /privacy {
        default_type text/html;
        alias /usr/share/nginx/public/privacy.html;
    }
    location = /terms {
        default_type text/html;
        alias /usr/share/nginx/public/terms.html;
    }
    location = /offer {
        default_type text/html;
        alias /usr/share/nginx/public/offer.html;
    }
    location = /support {
        default_type text/html;
        alias /usr/share/nginx/public/support.html;
    }
    location /assets/ {
        alias /usr/share/nginx/public/assets/;
    }

    location /api/ {
        proxy_pass http://api:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://admin:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
