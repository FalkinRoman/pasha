# stopkek production — из корня репозитория:
#   cp deploy/.env.prod.example deploy/.env.prod
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../stopkek-api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NODE_ENV: production
      PORT: 3001
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  admin:
    build:
      context: ../stopkek-admin
      dockerfile: Dockerfile
      args:
        # /api = http://IP/api через gateway; иначе PUBLIC_API_URL
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    volumes:
      - ./nginx-gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/usr/share/nginx/public:ro
      - ./certbot-www:/var/www/certbot:ro
      - ./certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - admin

  # Автопродление сертификата (после init-ssl.sh)
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./certbot-www:/var/www/certbot
      - ./certbot-certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $$!; done;"

volumes:
  pgdata:
  uploads:
