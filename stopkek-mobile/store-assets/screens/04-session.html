<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../shared.css" />
</head>
<body>
  <div class="app-screen">
    <div class="status-bar"><span>9:41</span><span style="font-size:12px;letter-spacing:2px">●●●</span></div>
    <div class="app-content scroll">
      <div class="header">
        <div class="header-side">
          <svg width="24" height="24" style="color:#fff"><use href="#icon-chevron-back"/></svg>
        </div>
        <div class="header-center"><div class="h3">Управление</div></div>
        <div class="header-side"></div>
      </div>

      <div class="text-center" style="margin:32px 0;">
        <div class="row-center gap-sm" style="justify-content:center;margin-bottom:8px;">
          <svg width="20" height="20" style="color:var(--accent)"><use href="#icon-game"/></svg>
          <span class="caption">Идёт игра</span>
        </div>
        <div class="timer">02:15:40</div>
        <div class="caption mt-sm">осталось</div>
      </div>

      <div class="h2 text-center">Место #1</div>
      <div class="body-secondary text-center mt-xs">СОЛО КАПСУЛЫ</div>

      <button class="btn btn-text mt-lg" type="button">Открыть главную дверь</button>
      <button class="btn btn-ghost btn-text mt-sm" type="button">Сканировать QR на мониторе</button>

      <div class="row gap-sm mt-xl">
        <button class="btn btn-text btn-flex" type="button">Продлить</button>
        <button class="btn btn-ghost btn-text btn-flex" type="button">Завершить</button>
      </div>
    </div>
  </div>
</body>
</html>
