<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../shared.css" />
</head>
<body>
  <div class="app-screen">
    <div class="status-bar"><span>9:41</span><span style="font-size:12px;letter-spacing:2px">●●●</span></div>
    <div class="app-content with-tabs" style="padding-left:0;padding-right:0;padding-top:calc(var(--safe-top) + 8px);">
      <div style="padding:0 16px;">
        <div class="header">
          <div class="header-side"></div>
          <div class="header-center"><div class="h3">Выбрать место</div></div>
          <div class="header-side" style="justify-content:flex-end;">
            <svg width="24" height="24" style="color:#fff"><use href="#icon-info"/></svg>
          </div>
        </div>
        <div class="row gap-md mb-md" style="align-items:center;">
          <div class="logo-box logo-thumb" style="flex-shrink:0;">
            <img src="../../assets/brand/logo-stopkek.png" alt="" />
          </div>
          <div style="flex:1;min-width:0;">
            <div class="h3" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">стопКЕК</div>
            <div class="caption mt-xs" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">Москва, ул. Игровая, 1</div>
            <div class="row-center gap-sm mt-xs">
              <svg width="12" height="12" style="color:#F9A825"><use href="#icon-star"/></svg>
              <span class="caption">5</span>
            </div>
          </div>
        </div>
      </div>

      <div class="map-area">
        <div class="floor-wrap">
          <div class="floor-card">
            <div class="floor-map-col">
              <svg viewBox="0 0 360 190" width="244" height="129">
                <rect x="6" y="6" width="348" height="178" fill="none" stroke="#333" stroke-width="1.5" rx="8"/>
                <text x="180" y="22" fill="#F9A825" font-family="Manrope,sans-serif" font-size="11" font-weight="700" text-anchor="middle">СОЛО КАПСУЛЫ</text>
                <text x="180" y="34" fill="#8a8a8a" font-family="Manrope,sans-serif" font-size="7" text-anchor="middle">Закрытые капсулы для одного человека.</text>
                <!-- room 1 free, selected -->
                <rect x="92" y="52" width="82" height="54" rx="10" fill="rgba(46,125,50,0.12)" stroke="#4caf50" stroke-width="1.5"/>
                <rect x="116" y="62" width="34" height="34" rx="8" fill="#fff" stroke="#C41E24" stroke-width="2.5"/>
                <text x="133" y="84" fill="#0A0A0A" font-family="Manrope,sans-serif" font-size="13" font-weight="700" text-anchor="middle">1</text>
                <!-- room 2 occupied -->
                <rect x="186" y="52" width="82" height="54" rx="10" fill="rgba(196,30,36,0.1)" stroke="#F9A825" stroke-width="1.5"/>
                <rect x="210" y="62" width="34" height="34" rx="8" fill="#5C2020" stroke="#C62828" stroke-width="1.5"/>
                <text x="227" y="84" fill="#888" font-family="Manrope,sans-serif" font-size="13" font-weight="700" text-anchor="middle">2</text>
                <!-- room 3 free -->
                <rect x="92" y="120" width="82" height="54" rx="10" fill="rgba(46,125,50,0.12)" stroke="#4caf50" stroke-width="1.5"/>
                <rect x="116" y="130" width="34" height="34" rx="8" fill="#3d9e40" stroke="#66bb6a" stroke-width="1.5"/>
                <text x="133" y="152" fill="#fff" font-family="Manrope,sans-serif" font-size="13" font-weight="700" text-anchor="middle">3</text>
                <!-- room 4 reserved -->
                <rect x="186" y="120" width="82" height="54" rx="10" fill="rgba(196,30,36,0.1)" stroke="#F9A825" stroke-width="1.5"/>
                <rect x="210" y="130" width="34" height="34" rx="8" fill="#5C4A00" stroke="#F9A825" stroke-width="1.5"/>
                <text x="227" y="152" fill="#fff" font-family="Manrope,sans-serif" font-size="13" font-weight="700" text-anchor="middle">4</text>
              </svg>
            </div>
            <div class="floor-config-col">
              <div class="config-line"><div class="label">Процессор</div><div class="value">RYZEN 7 7800 X3D</div></div>
              <div class="config-line"><div class="label">Видеокарта</div><div class="value">RTX 5070</div></div>
              <div class="config-line"><div class="label">Монитор</div><div class="value">27" 2K 300 Гц</div></div>
              <div class="config-line"><div class="label">Клавиатура</div><div class="value">Магнитная 75%</div></div>
              <div class="config-line"><div class="label">Наушники</div><div class="value">MCHOSE v9 pro</div></div>
              <div class="config-line"><div class="label">Мышь</div><div class="value">Attack Shark R11 Ultra</div></div>
            </div>
          </div>
          <div class="map-controls">
            <div class="map-ctrl">−</div>
            <div class="map-ctrl">⊙</div>
            <div class="map-ctrl">+</div>
          </div>
        </div>
      </div>

      <div class="map-footer">
        <p class="caption text-center">Место #1 · свободно</p>
        <button class="btn btn-text" type="button">Выбрать время</button>
      </div>
    </div>

    <div class="tab-bar">
      <div class="tab-item"><svg><use href="#icon-home"/></svg>Главная</div>
      <div class="tab-item active"><svg><use href="#icon-grid"/></svg>Забронировать</div>
      <div class="tab-item"><svg><use href="#icon-person"/></svg>Профиль</div>
    </div>
  </div>
</body>
</html>
