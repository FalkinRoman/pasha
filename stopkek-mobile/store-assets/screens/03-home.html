<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../shared.css" />
</head>
<body>
  <div class="app-screen">
    <div class="status-bar"><span>9:41</span><span style="font-size:12px;letter-spacing:2px">●●●</span></div>
    <div class="app-content with-tabs scroll">
      <div class="row-between mb-md">
        <div>
          <div class="brand-sm" style="color:var(--text-secondary);margin-bottom:4px;">стопКЕК</div>
          <div class="h2">Привет, Игрок</div>
        </div>
        <div class="logo-box logo-44">
          <img src="../../assets/brand/logo-stopkek.png" alt="" />
        </div>
      </div>

      <div class="card mb-md">
        <div class="caption">Баланс</div>
        <div class="row-between" style="margin-top:4px;align-items:center;">
          <div class="h1">5 000 ₽</div>
          <svg width="28" height="28" style="color:var(--accent)"><use href="#icon-add-circle"/></svg>
        </div>
      </div>

      <div class="card card-accent mb-md">
        <div class="row-between">
          <div>
            <div class="caption">Бронь оплачена</div>
            <div class="h2 mt-xs">Место #1</div>
            <div class="body-secondary">СОЛО КАПСУЛЫ</div>
            <div class="caption mt-xs">Забронировано до 22:00 · сегодня</div>
          </div>
          <svg width="32" height="32" style="color:var(--accent);flex-shrink:0"><use href="#icon-game"/></svg>
        </div>
        <div class="timer mt-md mb-xs">42:15</div>
        <div class="caption">до приёмки</div>
        <button class="btn btn-text mt-md" type="button">Управление</button>
      </div>

      <div class="caption mb-sm">Клуб</div>
      <div class="card">
        <div class="h3">стопКЕК</div>
        <div class="body-secondary mt-xs">Москва, ул. Игровая, 1</div>
        <div class="row-center gap-sm mt-sm">
          <svg width="14" height="14" style="color:#F9A825"><use href="#icon-star"/></svg>
          <span class="caption">5</span>
          <span class="caption"> · 24/7</span>
        </div>
      </div>
    </div>

    <div class="tab-bar">
      <div class="tab-item active"><svg><use href="#icon-home"/></svg>Главная</div>
      <div class="tab-item"><svg><use href="#icon-grid"/></svg>Забронировать</div>
      <div class="tab-item"><svg><use href="#icon-person"/></svg>Профиль</div>
    </div>
  </div>
</body>
</html>
