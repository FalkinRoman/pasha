<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../shared.css" />
</head>
<body>
  <div class="app-screen">
    <div class="status-bar"><span>9:41</span><span style="font-size:12px;letter-spacing:2px">●●●</span></div>
    <div class="app-content scroll" style="display:flex;flex-direction:column;">
      <div class="text-center mb-xl">
        <div class="logo-box logo-64" style="margin:0 auto 16px;">
          <img src="../../assets/brand/logo-stopkek.png" alt="" />
        </div>
        <div class="h1 mt-md">Вход</div>
        <p class="body-secondary mt-sm">Введите номер телефона</p>
      </div>

      <div class="input-wrap mb-lg">
        <label class="caption">Номер телефона</label>
        <div class="input">+7 (900) 123-45-67</div>
      </div>

      <p class="caption" style="line-height:18px;margin-bottom:24px;">
        Продолжая, вы соглашаетесь с
        <span class="link">политикой конфиденциальности</span>
        и
        <span class="link">пользовательским соглашением</span>
      </p>

      <button class="btn btn-text" type="button" style="margin-top:auto;">Продолжить</button>
      <p class="body text-center mt-lg" style="color:var(--accent);">Не получается войти? Поддержка</p>
    </div>
  </div>
</body>
</html>
