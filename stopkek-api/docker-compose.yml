services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stopkek
      POSTGRES_PASSWORD: stopkek
      POSTGRES_DB: stopkek
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  pgdata:
